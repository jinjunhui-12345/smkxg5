<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>解剖图册 - 生命科学馆</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #09090b;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background: #18181b;
            color: white;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #27272a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .back-link {
            color: #10b981;
            text-decoration: none;
            margin-right: 16px;
            font-size: 20px;
            display: flex;
            align-items: center;
            transition: opacity 0.2s;
        }
        .back-link:hover {
            opacity: 0.8;
        }
        .title {
            font-weight: 600;
            font-size: 18px;
            letter-spacing: -0.025em;
        }
        iframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="back-link">←</a>
        <div class="title">解剖图册</div>
    </header>
    <iframe src="lsmbooks.pdf"></iframe>
</body>
</html>
